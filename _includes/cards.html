{% assign card_id = include.title | slugify %}
<section class="custom-cards my-5">
  <article class="card bg-dark text-light border-0 shadow-lg card-hover card-article"
           aria-labelledby="card-title-{{ card_id }}"
           aria-describedby="card-desc-{{ card_id }}"
           tabindex="0">
    <div class="card-body p-4 position-relative">
      <!-- Ícone ilustrativo -->
      <div class="mb-3" aria-hidden="true">
        <span class="rounded-circle p-3 d-inline-flex align-items-center justify-content-center text-light card-icon-circle">
          {{ include.number }}
        </span>
      </div>

      <h3 class="card-title text-light mb-3 fw-bold h5" id="card-title-{{ card_id }}">
        {{ include.title }}
      </h3>
      <div class="card-text text-high-contrast lh-base" id="card-desc-{{ card_id }}">
        {{ include.content }}
      </div>
    </div>
  </article>
</section>
