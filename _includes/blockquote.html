<div class="custom-blockquote my-5" aria-label="Citação em destaque">
  <div class="card bg-dark border-0 shadow-lg position-relative">
    <!-- Borda gradiente lateral -->
    <div class="position-absolute top-0 start-0 h-100 blockquote-accent-bar"></div>

    <!-- Padrão de fundo sutil -->
    <div class="position-absolute top-0 end-0 blockquote-bg-pattern"></div>

    <div class="card-body p-5 position-relative blockquote-content">
      <!-- Ícone de aspas -->
      <div class="quote-header mb-4">
        <div class="bg-secondary bg-opacity-15 rounded-3 p-3 d-inline-flex">
          <i class="material-icons fs-2 text-white" aria-hidden="true">format_quote</i>
          <span class="visually-hidden">Início da citação</span>
        </div>
      </div>

      <!-- Texto da citação -->
      <blockquote class="blockquote mb-0">
        <p class="lead text-light mb-4 lh-lg">
          {{ include.quote }}
        </p>

        <!-- Linha decorativa -->
        <div class="quote-decoration mb-3" aria-hidden="true">
          <div class="quote-decoration-line"></div>
        </div>

        <!-- Footer com autor -->
        <footer class="blockquote-footer border-0 ps-0">
          <div class="d-flex align-items-center">
            <cite class="text-white fw-medium">{{ include.author }}</cite>
          </div>
        </footer>
      </blockquote>
    </div>
  </div>
</div>
