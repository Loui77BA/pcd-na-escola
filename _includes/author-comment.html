<section class="author-comment my-5" aria-labelledby="comment-title">
  <div class="card bg-dark border-0 shadow-lg position-relative overflow-hidden author-comment-card">
    <!-- Gradiente de fundo sutil -->
    <div class="position-absolute top-0 start-0 w-100 h-100 author-comment-gradient" aria-hidden="true"></div>

    <div class="card-body p-5 position-relative author-comment-body">
      <!-- Ícone de aspas decorativo -->
      <div class="quote-icon-wrapper mb-4">
        <div class="d-flex align-items-center justify-content-between">
          <div class="d-flex align-items-center">
            <div class="bg-secondary rounded-circle p-3 me-3 shadow-sm author-comment-icon" aria-hidden="true">
              <i class="material-icons text-white fs-4">format_quote</i>
            </div>
            <h3 id="comment-title" class="text-primary mb-0 fw-bold">{{ include.title }}</h3>
          </div>
        </div>
      </div>

      <!-- Conteúdo do comentário -->
      <div class="comment-content">
        <blockquote class="border-start border-5 border-primary ps-4 mb-4">
          <p class="lead text-light mb-0 lh-lg author-comment-quote">
            {{ include.content }}
          </p>
        </blockquote>
        
        <!-- Footer com autor -->
        <footer class="d-flex align-items-center justify-content-between">
          <cite class="text-primary fw-semibold">— {{ include.author }}</cite>
          <div class="comment-decoration" aria-hidden="true">
            <div class="d-flex gap-1">
              <div class="bg-primary rounded-circle author-comment-dot-1"></div>
              <div class="bg-primary rounded-circle author-comment-dot-2"></div>
              <div class="bg-primary rounded-circle author-comment-dot-3"></div>
            </div>
          </div>
        </footer>
      </div>
    </div>
  </div>
</section>
