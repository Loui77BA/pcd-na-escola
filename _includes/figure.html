<figure class="custom-figure text-center my-5">
    <div class="figure-container position-relative d-inline-block">
        <div class="image-wrapper position-relative overflow-hidden shadow-lg">

            <img class="img-fluid"
                 src="{{ include.src }}"
                 alt="{{ include.alt }}"
                 loading="lazy" />

            <div class="image-overlay position-absolute top-0 start-0 w-100 h-100 d-flex align-items-center justify-content-center"
                 aria-hidden="true">
                <div class="text-center">
                    <i class="material-icons text-white fs-1 mb-3 zoom-icon" aria-hidden="true">zoom_in</i>
                    <p class="text-white small mb-0 zoom-text">Clique para ampliar</p>
                </div>
            </div>
        </div>

        <div class="figure-decoration position-absolute bottom-0 start-50 translate-middle-x"
             aria-hidden="true">
            <div class="bg-primary rounded-pill shadow-sm accent-bar"></div>
        </div>
    </div>

    {% if include.caption %}
        <figcaption id="figcaption-{{ include.src | slugify }}"
                    class="figure-caption text-center mt-4">
            <div class="d-inline-flex align-items-center bg-dark bg-opacity-50 rounded-pill px-4 py-3 figcaption-wrapper">
                <span class="text-light small figcaption-text">{{ include.caption }}</span>
            </div>
        </figcaption>
    {% endif %}
</figure>
