<div class="post-video-embed cf-player">
  <div class="post-video-wrapper">
    <iframe
      src="{{ include.src }}"
      loading="lazy"
      allow="accelerometer; gyroscope; autoplay; encrypted-media; picture-in-picture"
      allowfullscreen
      title="{{ include.title | default: 'Vídeo incorporado' }}">
    </iframe>
  </div>
</div>
