<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title | default: site.title }} - {{ site.title }}</title>

    <!-- Paleta visual -->
    <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/courses.css' | relative_url }}">
    <link rel="apple-touch-icon" href="{{ '/assets/images/apple-touch-icon.png' | relative_url }}">
    <link rel="apple-touch-icon-precomposed" href="{{ '/assets/images/apple-touch-icon-precomposed.png' | relative_url }}">
    <link rel="icon" type="image/x-icon" href="{{ '/assets/favicon.ico' | relative_url }}">
    <meta name="theme-color" content="#18181d">
    <meta name="color-scheme" content="dark">

    <!-- Material Symbols + Bootstrap Icons -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/css/a11y-toolbar.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/cf-player.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}">

    {% seo %}
  </head>
  <body id="topo" class="d-flex flex-column h-100">
    {% include navbar.html %}

    <main id="main-content" class="flex-shrink-0 py-4" data-pagefind-body>
      <div class="container">
        {{ content }}
      </div>
    </main>

    {% include footer.html %}

    {% include mermaid.html %}

    {% include search-modal.html %}

    <!-- Botão de voltar ao topo -->
    <a href="#topo"
       class="btn btn-outline-light position-fixed bottom-0 end-0 m-3 back-to-top"
       role="button"
       aria-label="Voltar ao topo da página">
      <span class="material-symbols-outlined" aria-hidden="true">arrow_upward</span>
    </a>

    <!-- VLibras -->
    <div vw class="enabled vlibras-widget" aria-hidden="true">
      <div vw-access-button class="active" aria-hidden="true"></div>
      <div vw-plugin-wrapper>
        <div class="vw-plugin-top-wrapper" aria-hidden="true"></div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
    <script src="https://vlibras.gov.br/app/vlibras-plugin.js" defer></script>
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        new window.VLibras.Widget('https://vlibras.gov.br/app');
      });
    </script>
    <script async
      src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.7/MathJax.js?config=TeX-MML-AM_CHTML">
    </script>
    <script type="text/x-mathjax-config">
      MathJax.Hub.Config({
        tex2jax: {
          inlineMath: [['$', '$'], ['\\(', '\\)']],
          displayMath: [['$$', '$$'], ['\\[', '\\]']],
          processEscapes: true
        }
      });
    </script>
    
    <!-- A11y Toolbar – começo -->
    <!-- CSS movido para assets/css/a11y-toolbar.css -->

    <button id="a11yToggle" class="a11y-toggle" aria-controls="a11yToolbar" aria-expanded="false" aria-hidden="true">
      <span class="material-symbols-outlined" aria-hidden="true">accessibility_new</span>
      <span class="sr-only">Opções de acessibilidade</span>
    </button>

    <nav id="a11yToolbar" class="a11y-toolbar" aria-label="Ferramentas de acessibilidade" aria-hidden="true">
      <div class="a11y-title">Ferramentas</div>
      <button type="button" id="a11yInc" aria-label="Aumentar tamanho do texto">🔍 Aumentar texto</button>
      <button type="button" id="a11yDec" aria-label="Diminuir tamanho do texto">🔎 Diminuir texto</button>
      <button type="button" id="a11yHC" aria-pressed="false" aria-label="Ativar alto contraste">🎯 Alto contraste</button>
      <button type="button" id="a11yNeg" aria-pressed="false" aria-label="Ativar contraste negativo (inverter cores)">🌓 Contraste negativo</button>
      <button type="button" id="a11yGray" aria-pressed="false" aria-label="Ativar escala de cinza">⚪ Escala de cinza</button>
      <button type="button" id="a11yUnder" aria-pressed="false" aria-label="Sublinhar links">🔗 Links sublinhados</button>
      <button type="button" id="a11yRead" aria-pressed="false" aria-label="Fonte legível">🅰️ Fonte legível</button>
      <button type="button" id="a11yReset" aria-label="Redefinir ajustes">↩️ Redefinir</button>
    </nav>

    <div id="a11yLive" class="sr-only" aria-live="polite"></div>

    <script src="{{ '/assets/js/a11y-init.js' | relative_url }}" defer></script>
    <!-- A11y Toolbar – fim -->

    <!-- Player de vídeo acessível (controles em pt-BR) -->
    <script src="https://embed.cloudflarestream.com/embed/sdk.latest.js"></script>
    <script src="{{ '/assets/js/cf-player.js' | relative_url }}" defer></script>

    <script src="{{ '/assets/js/search-init.js' | relative_url }}" defer></script>
  </body>
</html>
