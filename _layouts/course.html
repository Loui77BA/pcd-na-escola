---
layout: default
---

<div class="text-center mb-4">
  <i class="bi bi-eye-fill" style="font-size: 4rem; color: var(--accent-color);" aria-hidden="true"></i>
</div>

<h1 class="section-title" id="course-title">{{ page.title }}</h1>

<ul class="video-list" id="video-list" aria-labelledby="course-title">
  {% for lesson in page.lessons %}
  <li>
    <button type="button"
            class="video-card-btn"
            data-lesson-index="{{ forloop.index0 }}"
            aria-label="Assistir Aula {{ lesson.number }}: {{ lesson.title }}{% if lesson.transcript_pending %}, transcrição em breve{% else %}, transcrição disponível{% endif %}">
      <article class="video-card">
        <div class="video-thumbnail-wrapper">
          <img src="https://customer-n8imyf4ea5hvxexl.cloudflarestream.com/{{ lesson.id }}/thumbnails/thumbnail.jpg?time={{ lesson.thumbnail_time }}&height=600"
               alt="" aria-hidden="true" loading="lazy">
          <span class="lesson-number-badge" aria-hidden="true">Aula {{ lesson.number }}</span>
          <div class="play-icon-overlay" aria-hidden="true">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M8 5V19L19 12L8 5Z" fill="white"/>
            </svg>
          </div>
        </div>
        <div class="video-info">
          <h3>Aula {{ lesson.number }} - {{ lesson.title }}</h3>
          <p>{{ lesson.description }}</p>
          {% if lesson.transcript_pending %}
          <span class="transcript-status transcript-status--pending" aria-hidden="true">
            <i class="bi bi-clock"></i> Transcrição em breve
          </span>
          {% else %}
          <span class="transcript-status transcript-status--available" aria-hidden="true">
            <i class="bi bi-card-text"></i> Transcrição disponível
          </span>
          {% endif %}
        </div>
      </article>
    </button>
  </li>
  {% endfor %}
</ul>

<!-- Modal único: conteúdo populado por JS -->
<div class="modal fade" id="course-modal" tabindex="-1" aria-labelledby="course-modal-label">
  <div class="modal-dialog modal-dialog-centered modal-video">
    <div class="modal-content">

      <div class="modal-header">
        <div class="modal-title-group">
          <h2 class="custom-modal-title" id="course-modal-label"></h2>
          <span class="lesson-progress" aria-live="polite"></span>
        </div>
        <button type="button" class="custom-close-btn" data-bs-dismiss="modal" aria-label="Fechar janela">
          <i class="bi bi-x-lg"></i>
        </button>
      </div>

      <div class="modal-body">
        <div class="video-container">
          <div class="ratio ratio-16x9 bg-black rounded">
            <iframe id="course-iframe" src="" title=""
              allow="accelerometer; gyroscope; autoplay; encrypted-media; picture-in-picture"
              allowfullscreen>
            </iframe>
          </div>
        </div>
        <details class="video-transcript" open>
          <summary class="transcript-summary">
            <span>Transcrição da aula</span>
            <i class="bi bi-chevron-down transcript-chevron" aria-hidden="true"></i>
          </summary>
          <div class="transcript-content" id="course-transcript"></div>
        </details>
      </div>

      <div class="modal-footer">
        <button type="button" id="btn-prev-lesson" class="btn-lesson-nav" aria-label="Aula anterior">
          <i class="bi bi-chevron-left" aria-hidden="true"></i> Anterior
        </button>
        <button type="button" class="btn btn-outline-light btn-sm" data-bs-dismiss="modal">Fechar</button>
        <button type="button" id="btn-next-lesson" class="btn-lesson-nav" aria-label="Próxima aula">
          Próxima <i class="bi bi-chevron-right" aria-hidden="true"></i>
        </button>
      </div>

    </div>
  </div>
</div>

<!-- Dados das aulas para o JS -->
<script>
const courseLessons = [
  {% for lesson in page.lessons %}
  {
    id: {{ lesson.id | jsonify }},
    number: {{ lesson.number | jsonify }},
    title: {{ lesson.title | jsonify }},
    transcript: {{ lesson.transcript | markdownify | jsonify }}
  }{% unless forloop.last %},{% endunless %}
  {% endfor %}
];
</script>

<script src="{{ '/assets/js/course.js' | relative_url }}" defer></script>
