---
layout: default
---

<div class="text-center mb-4">
  <i class="bi bi-eye-fill" style="font-size: 4rem; color: var(--accent-color);" aria-hidden="true"></i>
</div>

<h1 class="section-title" id="course-title">{{ page.title }}</h1>

<ul class="video-list" id="video-list" aria-labelledby="course-title">
  {% for lesson in page.lessons %}
  <li>
    <button type="button"
            class="video-card-btn"
            data-bs-toggle="modal"
            data-bs-target="#modal-{{ lesson.id }}"
            aria-label="Assistir Aula {{ lesson.number }}: {{ lesson.title }}">
      <article class="video-card">
        <div class="video-thumbnail-wrapper">
          <img src="https://customer-n8imyf4ea5hvxexl.cloudflarestream.com/{{ lesson.id }}/thumbnails/thumbnail.jpg?time={{ lesson.thumbnail_time }}&height=600"
               alt="" aria-hidden="true" loading="lazy">
          <div class="play-icon-overlay" aria-hidden="true">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M8 5V19L19 12L8 5Z" fill="white"/>
            </svg>
          </div>
        </div>
        <div class="video-info">
          <h3>Aula {{ lesson.number }} - {{ lesson.title }}</h3>
          <p>{{ lesson.description }}</p>
        </div>
      </article>
    </button>
  </li>
  {% endfor %}
</ul>

{% for lesson in page.lessons %}
{% assign modal_id = lesson.id | prepend: 'modal-' %}
<div class="modal fade" id="{{ modal_id }}" tabindex="-1" aria-labelledby="{{ modal_id }}-label">
  <div class="modal-dialog modal-dialog-centered modal-compact modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="custom-modal-title" id="{{ modal_id }}-label">Aula {{ lesson.number }} - {{ lesson.title }}</h2>
        <button type="button" class="custom-close-btn" data-bs-dismiss="modal" aria-label="Fechar Janela">
          <i class="bi bi-x-lg"></i>
        </button>
      </div>
      <div class="modal-body">
        <div class="ratio ratio-16x9 mb-3 bg-black rounded">
          <iframe
            src="https://customer-n8imyf4ea5hvxexl.cloudflarestream.com/{{ lesson.id }}/iframe?poster=https%3A%2F%2Fcustomer-n8imyf4ea5hvxexl.cloudflarestream.com%2F{{ lesson.id }}%2Fthumbnails%2Fthumbnail.jpg%3Ftime%3D1s%26height%3D600"
            title="Vídeo: Aula {{ lesson.number }} - {{ lesson.title }}"
            allow="accelerometer; gyroscope; autoplay; encrypted-media; picture-in-picture"
            allowfullscreen>
          </iframe>
        </div>
        <div class="video-transcript">
          {{ lesson.transcript | markdownify }}
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-light btn-sm" data-bs-dismiss="modal">Fechar</button>
      </div>
    </div>
  </div>
</div>
{% endfor %}

<script src="{{ '/assets/js/course.js' | relative_url }}" defer></script>
